<!doctype html>
<!--
postMessage Harness

Purpose:
- Load any target URL in an iframe
- Send postMessages to it (string and JSON/object)
- Log any messages received back (origin + whether it came from the iframe)

Notes:
- Sending is always allowed cross-origin; the target decides whether to act on it.
- For final PoCs, replace targetOrigin="*" with the exact expected origin.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>postMessage Harness</title>
  <meta name="referrer" content="no-referrer">

  <style>
    body { font-family: system-ui, sans-serif; margin: 16px; }
    iframe { width: 100%; height: 70vh; border: 1px solid #ccc; }
    pre { background: #f6f8fa; padding: 12px; overflow: auto; white-space: pre-wrap; }
    input, button, textarea { font: inherit; }
    textarea { width: 100%; height: 120px; }
    .row { margin: 10px 0; }
    .btns button { margin-right: 8px; }
  </style>
</head>

<body>
  <h1>postMessage Harness</h1>

  <div class="row">
    Target URL:
    <input id="targetUrl" style="width:70%" placeholder="https://victim.example/path">
    <button id="load">Load iframe</button>
  </div>

  <div class="row">
    targetOrigin:
    <input id="targetOrigin" style="width:40%" value="*">
    <span style="opacity:.7">Use "*" for exploration; use exact origin for final PoCs</span>
  </div>

  <div class="row">
    Payload (string or JSON):
    <textarea id="payload">{ "test": "hello" }</textarea>
  </div>

  <div class="row btns">
    <button id="sendString">Send as string</button>
    <button id="sendJson">Send as JSON (parsed)</button>
    <button id="clear">Clear log</button>
  </div>

  <iframe id="victim"></iframe>


  <h2>Log</h2>
  <pre id="log"></pre>

  <script>
    const $ = (id) => document.getElementById(id);
    const iframe = $("victim");
    const logEl = $("log");

    function log(line) {
      logEl.textContent += line + "\n";
      console.log(line);
    }


    function logMessageEvent(e) {
      const fromFrame = (e.source === iframe.contentWindow);
      log("=== message received ===");
      log("origin: " + e.origin);
      log("from iframe: " + fromFrame);
      log("data: " + (typeof e.data === "string" ? e.data : JSON.stringify(e.data)));
      log("");
    }

    window.addEventListener("message", logMessageEvent);

    function sendToVictim(payload) {
      if (!iframe.contentWindow) {
        log("iframe not ready (load a URL first)");
        log("");
        return;
      }

      const origin = $("targetOrigin").value.trim() || "*";
      log(">>> sending (targetOrigin=" + origin + ")");
      log("payload: " + (typeof payload === "string" ? payload : JSON.stringify(payload)));
      iframe.contentWindow.postMessage(payload, origin);
      log("");
    }

    $("load").addEventListener("click", () => {
      const url = $("targetUrl").value.trim();
      if (!url) return log("Enter a target URL first.");

      iframe.src = url;
      log("Loaded iframe: " + url);
      log("");
    });

    $("sendString").addEventListener("click", () => {
      sendToVictim($("payload").value);
    });

    $("sendJson").addEventListener("click", () => {
      const raw = $("payload").value;
      try {
        sendToVictim(JSON.parse(raw));
      } catch (e) {
        log("JSON parse error: " + e);
        log("");
      }
    });

    $("clear").addEventListener("click", () => {
      logEl.textContent = "";
    });
  </script>
</body>
</html>
